<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User</title>
</head>
<body>
    <div class="loading">Loading...</div>
    <div class="fatal" style="display: none">Could not display the data</div>
    <div class="body" style="display: none">
        <p>
            <h5>Id</h5>
            <div class="id"></div>
        </p>
        <p>
            <h5>Name</h5>
            <div class="name"></div>
        </p>
        <p>
            <h5>Username</h5>
            <div class="username"></div>
        </p>
        <p>
            <h5>Phone</h5>
            <div class="phone"></div>
        </p>
        <p>
            <h5>Email</h5>
            <div class="email"></div>
        </p>
        <p>
            <h5>Website</h5>
            <div class="website"></div>
        </p>

        <div class="address" style="border: solid; margin: 15px">
            <h4>Address</h4>

            <p>
                <h5>City</h5>
                <div class="city"></div>
            </p>
            <div class="geo">
                <h5>Geo</h5>
                <p>
                    <h5>Lat</h5>
                    <div class="lat"></div>
                </p>
                <p>
                    <h5>Lng</h5>
                    <div class="lng"></div>
                </p>
            </div>
            <p>
                <h5>Street</h5>
                <div class="street"></div>
            </p>
            <p>
                <h5>Suite</h5>
                <div class="suite"></div>
            </p>
            <p>
                <h5>Zipcode</h5>
                <div class="zipcode"></div>
            </p>
        </div>

        <div class="company" style="border: solid; margin: 15px">
            <h4>Company</h4>

            <p>
                <h5>Bs</h5>
                <div class="bs"></div>
            </p>
            <p>
                <h5>Catch Phrase</h5>
                <div class="catchPhrase"></div>
            </p>
            <p>
                <h5>Name</h5>
                <div class="company-name"></div>
            </p>
        </div>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
